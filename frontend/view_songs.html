<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Songs - MusiCollection</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <!-- Header with Navigation (unchanged visual design) -->
    <header>
      <div class="container header-container">
        <h1>MusiCollection</h1>
        <nav>
          <ul>
            <li><a href="index.html#home">Home</a></li>
            <li><a href="index.html#albums">Albums</a></li>
            <li><a href="index.html#songs">Songs</a></li>
            <li><a href="index.html#artists">Artists</a></li>
            <li><a href="index.html#assign">Assign Artist</a></li>
            <li><a href="view_songs.html">View Songs</a></li>
          </ul>
        </nav>
      </div>
    </header>

    <!-- Main Content Area for Viewing Songs -->
    <main>
        <section id="view-songs">
            <div class="container">
              <h2>Your Songs</h2>
          
              <!-- Song list -->
              <div class="songs-list">
                <!-- One .song-item per song -->
                <div class="song-item">
                  <span><strong>Song ID:</strong> 1</span>
                  <span><strong>Title:</strong> Example Song</span>
                  <span><strong>Artist:</strong> John Doe</span>
                  <span><strong>Album:</strong> Example Album</span>
                  <span><strong>Genre:</strong> Rock</span>
                  <span><strong>Release Year:</strong> 2025</span>
                  <span><strong>Duration:</strong> 03:45</span>
                  <span><strong>Added On:</strong> 2025-04-16 12:00:00</span>
                </div>
                <!-- Repeat .song-item for each additional song -->
              </div>
            </div>
          </section>
          
    </main>

    <!-- Footer (kept identical) -->
    <footer>
      <div class="container">
        <p>&copy; 2025 MusiCollection App. All rights reserved.</p>
      </div>
    </footer>

    
  </body>

  
</html>
